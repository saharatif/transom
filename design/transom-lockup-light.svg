<svg xmlns="http://www.w3.org/2000/svg" width="240" height="56" viewBox="0 0 240 56" fill="none">
  <!-- Transom brand lockup, light theme. The mark is a transom fanlight
       (the arched window above a door). Colors match the app light theme:
       primary blue #007bff, main text #212529, muted text #67707b. -->
  <rect x="4" y="4" width="48" height="48" rx="12" fill="#007bff"/>
  <g stroke="#ffffff" stroke-width="2.6" stroke-linecap="round">
    <path d="M 14 37 H 42"/>
    <path d="M 15 37 A 13 13 0 0 1 41 37"/>
    <path d="M 28 37 L 28 24"/>
    <path d="M 28 37 L 18.8 27.8"/>
    <path d="M 28 37 L 37.2 27.8"/>
  </g>
  <text x="64" y="30" font-family="Inter, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="19" font-weight="800" letter-spacing="3.4" fill="#212529">TRANSOM</text>
  <text x="64" y="44" font-family="Inter, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="8.5" font-weight="600" letter-spacing="2.3" fill="#67707b">PROPERTY INTELLIGENCE</text>
</svg>
