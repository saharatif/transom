<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Property Intelligence</title>
    <script>
      // Applied before Vue mounts so there's no flash of the wrong
      // theme on load. Default is dark; ThemeToggle.vue reads this
      // same attribute on mount to sync its own visual state.
      document.documentElement.setAttribute(
        'data-theme',
        localStorage.getItem('theme') || 'dark'
      )
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
